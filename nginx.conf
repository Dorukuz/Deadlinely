# Use real public host when the app is reached via Coolify/localhost (prevents Location: http://localhost:8080/...).
map $http_host $site_host {
    default                    deadlinely.gatex.uk;
    "~^deadlinely\.gatex\.uk"  deadlinely.gatex.uk;
}

server {
    listen 80;
    server_name deadlinely.gatex.uk;
    root /usr/share/nginx/html;
    index index.html;

    absolute_redirect off;
    port_in_redirect off;

    gzip on;
    gzip_types text/css application/javascript text/html application/json;

    location = /privacy {
        return 301 https://$site_host/privacy.html;
    }

    location = /terms {
        return 301 https://$site_host/terms.html;
    }

    location = /support {
        return 301 https://$site_host/support.html;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
